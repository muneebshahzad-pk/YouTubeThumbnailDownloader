<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YouTube Thumbnail Downloader</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: linear-gradient(135deg, #0f172a, #1e293b);
  color: white;
}

.main {
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

.card {
  background: rgba(255,255,255,0.05);
  padding: 40px;
  border-radius: 15px;
  text-align: center;
  width: 400px;
  backdrop-filter: blur(10px);
  box-shadow: 0 0 30px rgba(0,0,0,0.5);
}

h1 {
  margin-bottom: 10px;
}

p {
  font-size: 14px;
  color: #94a3b8;
}

input {
  width: 100%;
  padding: 12px;
  margin-top: 20px;
  border-radius: 8px;
  border: none;
  outline: none;
}

button {
  width: 100%;
  padding: 12px;
  margin-top: 15px;
  border: none;
  border-radius: 8px;
  background: #2563eb;
  color: white;
  font-size: 16px;
  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #1d4ed8;
  transform: scale(1.05);
}

#result img {
  margin-top: 20px;
  width: 100%;
  border-radius: 10px;
}

#result a {
  display: block;
  margin-top: 10px;
  color: #38bdf8;
  text-decoration: none;
}
</style>
</head>

<body>

<div class="main">
  <div class="card">
    <h1>YouTube Thumbnail Downloader</h1>
    <p>Paste your video link and get HD thumbnail instantly</p>

    <input type="text" id="url" placeholder="Paste YouTube URL...">

    <button onclick="getThumbnail()">Get Thumbnail</button>

    <div id="result"></div>
  </div>
</div>

<script>
function getThumbnail() {
  let url = document.getElementById("url").value;

  let videoId;

  if (url.includes("youtu.be/")) {
    videoId = url.split("youtu.be/")[1];
  } else if (url.includes("v=")) {
    videoId = url.split("v=")[1].split("&")[0];
  } else {
    alert("Invalid YouTube URL");
    return;
  }

  let thumbnail = `https://img.youtube.com/vi/${videoId}/maxresdefault.jpg`;

  document.getElementById("result").innerHTML = `
    <img src="${thumbnail}">
    <a href="${thumbnail}" download>⬇ Download Thumbnail</a>
  `;
}
</script>

</body>
</html>
